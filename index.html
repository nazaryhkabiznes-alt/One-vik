<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneVik - Только Видео</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { color: #00aff0; margin-bottom: 5px; }
        .container { width: 90%; max-width: 800px; text-align: center; }
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        video {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            border: 2px solid #00aff0;
        }
        .controls {
            background: #2a2a35;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            background: #111;
            color: #00ff00;
            border: 1px solid #444;
            font-size: 18px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        button {
            background-color: #00aff0;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        .connect-btn { background-color: #28a745; }
        label { display: block; margin-bottom: 8px; font-weight: bold;}
        .status { color: #aaa; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>OneVik Video Test</h1>
    <p>Тестируем чистое видео без звука</p>

    <div class="controls">
        <label for="roomCode">Введите 5 цифр комнаты:</label>
        <input type="text" id="roomCode" placeholder="77777" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <br>
        <button onclick="createRoom()">1. Создать звонок</button>
        <button class="connect-btn" onclick="joinRoom()">2. Подключиться</button>
        <div class="status" id="statusField">Статус: Ожидание камеры...</div>
    </div>

    <div class="video-grid">
        <div>
            <p>Вы</p>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div>
            <p>Друг</p>
            <video id="remoteVideo" autoplay playsinline muted></video>
        </div>
    </div>
</div>

<script>
    let localStream;
    let peer = null;

    const rtcConfig = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };

    // Шаг 1: Запрашиваем ТОЛЬКО ВИДЕО
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            document.getElementById('localVideo').srcObject = localStream;
            updateStatus('Камера готова к работе.');
        } catch (e) {
            updateStatus('Ошибка доступа к камере!');
            console.error(e);
        }
    });

    function updateStatus(text) {
        document.getElementById('statusField').innerText = 'Статус: ' + text;
        console.log(text);
    }

    // Создание комнаты
    function createRoom() {
        const code = document.getElementById('roomCode').value.trim();
if (code.length < 5) return alert('Минимум 5 цифр!');

        updateStatus('Создание комнаты...');
        peer = new Peer('onevik-' + code, { config: rtcConfig });

        peer.on('open', () => updateStatus('Комната создана! Ждем друга...'));

        peer.on('call', (call) => {
            updateStatus('Друг звонит, отправляем видео...');
            call.answer(localStream); 
            
            call.on('stream', (remoteStream) => {
                updateStatus('Связь установлена! Выводим видео...');
                const remoteVideo = document.getElementById('remoteVideo');
                remoteVideo.srcObject = remoteStream;
                remoteVideo.play().catch(err => console.log("Ошибка автоплея:", err));
            });
        });
    }

    // Подключение к комнате
    function joinRoom() {
        const code = document.getElementById('roomCode').value.trim();
        if (code.length < 5) return alert('Минимум 5 цифр!');

        updateStatus('Вызываем друга...');
        peer = new Peer({ config: rtcConfig });

        peer.on('open', () => {
            const call = peer.call('onevik-' + code, localStream);
            
            call.on('stream', (remoteStream) => {
                updateStatus('Успешное подключение! Выводим видео...');
                const remoteVideo = document.getElementById('remoteVideo');
                remoteVideo.srcObject = remoteStream;
                remoteVideo.play().catch(err => console.log("Ошибка автоплея:", err));
            });
        });
    }
</script>

</body>
</html>
