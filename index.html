<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneVik - Бесплатные звонки</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { color: #00aff0; margin-bottom: 5px; }
        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            margin-top: 20px;
        }
        video {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            border: 2px solid #00aff0;
        }
        .controls {
            background: #2a2a35;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            background: #111;
            color: #00ff00;
            border: 1px solid #444;
            font-size: 18px;
            text-align: center;
            font-family: monospace;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        button {
            background-color: #00aff0;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
            font-weight: bold;
        }
        button:hover { background-color: #0084b4; }
        .connect-btn { background-color: #28a745; }
        .connect-btn:hover { background-color: #218838; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 16px;}
        .status { color: #aaa; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>OneVik Video</h1>
    <p>Введите от 5 цифр, чтобы создать звонок или подключиться к другу</p>

    <div class="controls">
        <label for="roomCode">Цифровой код комнаты (только цифры, мин. 5 символов):</label>
        <input type="text" id="roomCode" placeholder="Например: 77777" oninput="validateInput(this)">
        
        <br>
        <button onclick="createRoom()">1. Создать звонок с этим кодом</button>
        <button class="connect-btn" onclick="joinRoom()">2. Подключиться к другу</button>
        
        <div class="status" id="statusField">Статус: Ожидание камеры...</div>
    </div>

    <div class="video-grid">
        <div>
            <p>Вы (Локальное видео)</p>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div>
            <p>Собеседник (Удаленное видео)</p>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>
</div>

<script>
    let localStream;
    let peer = null;

    // Расширенные настройки сети (STUN-серверы), чтобы пробивать блокировки провайдеров
    const rtcConfig = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun.services.mozilla.com' }
        ],
        sdpSemantics: 'unified-plan'
    };

    // Автоматически запрашиваем камеру и микрофон при открытии страницы
    window.addEventListener('DOMContentLoaded', async () => {
        try {
localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            updateStatus('Камера готова. Введите код комнаты.');
        } catch (e) {
            updateStatus('Ошибка: разрешите доступ к камере и микрофону!');
            alert('Для работы OneVik нужен доступ к камере и микрофону в настройках браузера.');
        }
    });

    // Фильтр ввода: разрешаем вводить ТЕПЕРЬ ТОЧНО только цифры (от 0 до 9)
    function validateInput(input) {
        input.value = input.value.replace(/[^0-9]/g, ''); 
    }

    // Проверка длины кода
    function checkCode(code) {
        if (!code || code.length < 5) {
            alert('Код должен содержать минимум 5 цифр!');
            return false;
        }
        return true;
    }

    function updateStatus(text) {
        document.getElementById('statusField').innerText = 'Статус: ' + text;
    }

    // Создание звонка (Вы — создатель комнаты)
    function createRoom() {
        const code = document.getElementById('roomCode').value.trim();
        if (!checkCode(code)) return;

        updateStatus('Создаем комнату ' + code + '...');
        
        // Создаем соединение с сетевыми настройками
        peer = new Peer('onevik-' + code, { config: rtcConfig });

        peer.on('open', (id) => {
            updateStatus('Комната ' + code + ' создана! Скинь этот код другу.');
        });

        // Слушаем входящий звонок от друга
        peer.on('call', (call) => {
            updateStatus('Друг подключается...');
            call.answer(localStream); // Отправляем другу свой поток видео/аудио
            
            call.on('stream', (remoteStream) => {
                // Получаем и показываем видео друга
                document.getElementById('remoteVideo').srcObject = remoteStream;
                updateStatus('Связь установлена!');
            });
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                alert('Этот код уже занят! Придумайте другие цифры.');
            } else {
                alert('Ошибка соединения: ' + err.type);
            }
            updateStatus('Ошибка.');
        });
    }

    // Подключение к звонку (Вы — тот, кто вводит код)
    function joinRoom() {
        const code = document.getElementById('roomCode').value.trim();
        if (!checkCode(code)) return;

        updateStatus('Подключаемся к коду ' + code + '...');

        // Создаем свой peer-объект с настройками сети
        peer = new Peer({ config: rtcConfig });

        peer.on('open', (id) => {
            // Звоним другу по его коду и передаем свою камеру
            const call = peer.call('onevik-' + code, localStream);
            
            call.on('stream', (remoteStream) => {
                // Принимаем видео друга и выводим на экран
                document.getElementById('remoteVideo').srcObject = remoteStream;
                updateStatus('Вы успешно подключились к звонку!');
            });
        });

        peer.on('error', (err) => {
            alert('Не удалось подключиться. Проверьте код комнаты.');
            updateStatus('Ошибка подключения.');
        });
    }
</script>

</body>
</html>
